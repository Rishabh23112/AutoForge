<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator">
      <input type="text" class="display" readonly value="0" />
      <div class="buttons">
        <button class="clear">C</button>
        <button class="operator" data-operator="/">&divide;</button>
        <button class="operator" data-operator="*">&times;</button>
        <button class="operator" data-operator="-">&minus;</button>
        <button class="number">7</button>
        <button class="number">8</button>
        <button class="number">9</button>
        <button class="operator" data-operator="+">&plus;</button>
        <button class="number">4</button>
        <button class="number">5</button>
        <button class="number">6</button>
        <button class="equals" data-operator="=">=</button>
        <button class="number">1</button>
        <button class="number">2</button>
        <button class="number">3</button>
        <button class="number zero">0</button>
        <button class="number decimal">.</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
